    // --- DATA & PROBLEM GENERATORS ---

    const generateProblem1 = () => {
      return {
        type: 'Afișor 7 Segmente (LUT)',
        title: 'Contor pe 7 Segmente cu LUT',
        task: `Scrie un program complet în main() care citește un buton activ pe 0 conectat la PB0 folosind funcția push_detect() (care returnează 1 la apăsare validă și e gata definită) și afișează cifra curentă pe un afișor 7 segmente conectat la Portul C.\n\nReguli:\n1. Configurează Portul C ca ieșire și PB0 ca intrare cu pull-up activat.\n2. Folosește vectorul global 'const unsigned char cifre[10]' deja declarat sub include-uri pentru decodare.\n3. Contorul începe de la 0, iar când crește peste 9, se resetează înapoi la 0.\n4. Trimite valoarea corespunzătoare direct din LUT pe Portul C.`,
        skeleton: `#include <avr/io.h>

const unsigned char cifre[10] = { 0x3F, 0x06, 0x5B, 0x4F, 0x66, 0x6D, 0x7D, 0x07, 0x7F, 0x6F };
unsigned char push_detect(void);

int main(void) {
    // Inițializare
    
    
    while(1) {
        // Bucla principală
        
    }
    return 0;
}`,
        checks: [
          { regex: /(?:DDRC\s*=\s*(?:0xFF|0b11111111|255)\s*;)/, desc: "Configurează tot Portul C ca ieșire în DDRC." },
          { regex: /(?:DDRB\s*&=\s*~\s*\(?\s*1\s*<<\s*(?:PB)?0\s*\)?|clrbit\s*\(\s*DDRB\s*,\s*(?:PB)?0\s*\))/, desc: "Configurează pinul PB0 ca intrare (buton)." },
          { regex: /(?:PORTB\s*\|?=\s*\(?\s*1\s*<<\s*(?:PB)?0\s*\)?|setbit\s*\(\s*PORTB\s*,\s*(?:PB)?0\s*\))/, desc: "Activează rezistența de pull-up pe pinul PB0 în PORTB." },
          { regex: /if\s*\(\s*push_detect\s*\(\s*\)\s*==\s*1\s*\)/, desc: "Apelează push_detect() în bucla while(1) pentru a detecta apăsările." },
          { regex: /(?:contor\s*\+\+\s*;|\bcontor\s*=\s*contor\s*\+\s*1\s*;)/, desc: "Incrementează contorul la detectarea unei apăsări." },
          { regex: /(?:contor\s*>\s*9|\bcontor\s*>=\s*10)/, desc: "Verifică dacă s-a depășit cifra 9 pentru a realiza resetarea." },
          { regex: /PORTC\s*=\s*cifre\s*\[\s*contor\s*\]\s*;/, desc: "Trimite valoarea corespunzătoare cifrei din LUT pe PORTC (PORTC = cifre[contor])." }
        ],
        guide: `Metoda Look-Up Table (LUT) este standardul de aur pentru afișarea pe 7 segmente. \n- Inițializezi DDRC ca ieșire (0xFF) și PB0 ca intrare (DDRB &= ~(1<<0)) cu pull-up activ (PORTB |= (1<<0)).\n- Declari un contor local (de exemplu, \`unsigned char contor = 0;\`) pe care îl actualizezi în \`while(1)\` la fiecare apăsare de buton (\`push_detect() == 1\`).\n- Dacă \`contor > 9\`, îl egalezi cu 0.\n- La final, scrii \`PORTC = cifre[contor];\` pentru actualizarea afișorului.`,
        solution: `int main(void) {\n    DDRC = 0xFF; // Portul C ca ieșire\n    DDRB &= ~(1 << 0); // PB0 ca intrare\n    PORTB |= (1 << 0); // Pull-up pe PB0\n    \n    unsigned char contor = 0;\n    PORTC = cifre[contor]; // Afișăm 0 la început\n    \n    while(1) {\n        if (push_detect() == 1) {\n            contor++;\n            if (contor > 9) {\n                contor = 0;\n            }\n            PORTC = cifre[contor];\n        }\n    }\n    return 0;\n}`

        skeleton: `#include <avr/io.h>

          { regex: /PORTC\s*=\s*cifre\s*\[\s*zar\s*\]\s*;/, desc: "Trimite valoarea corespunzătoare cifrei din LUT pe PORTC (PORTC = cifre[zar])." }
        ],
        guide: `Zarul electronic rulează continuu un contor între 1 și 6 în bucla while(1). La apăsarea butonului (push_detect() == 1), capturăm valoarea curentă a contorului și o afișăm pe Portul C: \`PORTC = cifre[zar];\`. Dacă zarul trece de 6, îl egalezi cu 1.`,
        solution: `int main(void) {\n    DDRC = 0xFF; // Portul C ca ieșire\n    DDRB &= ~(1 << 0); // PB0 ca intrare\n    PORTB |= (1 << 0); // Pull-up pe PB0\n    \n    unsigned char zar = 1;\n    \n    while(1) {\n        zar++;\n        if (zar > 6) {\n            zar = 1;\n        }\n        \n        if (push_detect() == 1) {\n            PORTC = cifre[zar];\n        }\n    }\n    return 0;\n}`
      };

    const generateProblem3 = () => {
      return {
        type: 'Shift Register (T4)',
        title: 'Problema 64: Ghirlanda cu 16 LED-uri (Shift Register)',
        task: `Implementează o funcție \`void trimite_serial_16biti(unsigned int date_leduri)\` care să trimită o valoare pe 16 biți către un registru de deplasare.\n\nDate hardware:\n- Pinul de Date (SD) este PC7\n- Pinul de Ceas (CP) este PC6\n\nPentru fiecare din cei 16 biți (de la cel mai puțin semnificativ la cel mai semnificativ):\n1. Setează pinul SD pe 1 sau 0 în funcție de starea bitului curent.\n2. Generează un puls complet de ceas pe CP (urcă-l în 1 logic, apoi coboară-l în 0 logic).`,
        skeleton: `#include <avr/io.h>

#define SD 7
#define CP 6

void trimite_serial_16biti(unsigned int date_leduri) {
    // Scrie logica for-ului și bitwise-ului aici
    
}`,
        checks: [
          { regex: /for\s*\(\s*int\s+i\s*=\s*0\s*;\s*i\s*<\s*16\s*;\s*i\s*\+\+\s*\)/, desc: "Implementează o buclă for care rulează de 16 ori (de la 0 la 15)." },
          { regex: /date_leduri\s*&\s*\(\s*1\s*<<\s*i\s*\)/, desc: "Verifică corect bitul 'i' folosind mascarea bitwise (date_leduri & (1 << i))." },
          { regex: /(?:PORTC\s*\|?=\s*\(?\s*1\s*<<\s*SD\s*\)?|setbit\s*\(\s*PORTC\s*,\s*SD\s*\))/, desc: "Setează pinul SD (PC7) pe 1 când bitul curent este 1." },
          { regex: /(?:PORTC\s*&=\s*~\s*\(?\s*1\s*<<\s*SD\s*\)?|clrbit\s*\(\s*PORTC\s*,\s*SD\s*\))/, desc: "Setează pinul SD (PC7) pe 0 când bitul curent este 0." },
          { regex: /(?:PORTC\s*\|?=\s*\(?\s*1\s*<<\s*CP\s*\)?|setbit\s*\(\s*PORTC\s*,\s*CP\s*\))/, desc: "Generează frontul crescător al ceasului (CP = 1)." },
          { regex: /(?:PORTC\s*&=\s*~\s*\(?\s*1\s*<<\s*CP\s*\)?|clrbit\s*\(\s*PORTC\s*,\s*CP\s*\))/, desc: "Generează frontul coborâtor al ceasului (CP = 0)." }
        ],
        guide: `Pentru serializare, parcurgi o buclă for de la 0 la 15:\n- Verifici starea bitului curent: \`if (date_leduri & (1 << i))\`\n- Dacă este 1: activezi SD cu \`PORTC |= (1 << SD);\` (sau \`setbit(PORTC, SD);\`).\n- Dacă este 0: dezactivezi SD cu \`PORTC &= ~(1 << SD);\` (sau \`clrbit(PORTC, SD);\`).\n- Trimiti bitul forțând un puls de ceas (CP high, apoi CP low): \n  \`PORTC |= (1 << CP);\` urmat de \`PORTC &= ~(1 << CP);\`.`,
        solution: `void trimite_serial_16biti(unsigned int date_leduri) {\n    for (int i = 0; i < 16; i++) {\n        if (date_leduri & (1 << i)) {\n            PORTC |= (1 << SD);\n        } else {\n            PORTC &= ~(1 << SD);\n        }\n        \n        PORTC |= (1 << CP); // Puls ceas HIGH\n        PORTC &= ~(1 << CP); // Puls ceas LOW\n    }\n}`

        title: 'Problema 68: Controlul Ușii Automate (FSM)',
        task: `Scrie mașina de stări finit (FSM) pentru o ușă automată în bucla while(1).\nStările posibile sunt ST_INCHIS (0) și ST_DESCHIS (1).\n\nComportament:\n1. În starea ST_INCHIS, dacă variabila globală 'senzor_om' devine 1, pornește motorul (apelează funcția 'porneste_motor()'), reține timpul curent (variabila 'timp_start' primește valoarea contorului 'milisecunde') și treci în starea ST_DESCHIS.\n2. În starea ST_DESCHIS, verifică dacă au trecut 5 secunde (5000 ms). Dacă da, oprește motorul (apelează 'opreste_motor()') și revino în starea ST_INCHIS.`,

        guide: `Mașinile de stare (FSM) sunt extrem de curate. Folosești un bloc switch(stare_usa):\n- case ST_INCHIS: dacă \`senzor_om == 1\`, pornești motorul, înregistrezi timpul curent (\`timp_start = milisecunde;\`) și muți starea: \`stare_usa = ST_DESCHIS;\`.\n- case ST_DESCHIS: dacă diferența de timp \`(milisecunde - timp_start) >= 5000\` s-a îndeplinit, oprești motorul și revii la starea inițială: \`stare_usa = ST_INCHIS;\`. Nu uita de break-urile de la sfârșitul fiecărui case!`,

    // --- SYNTAX HIGHLIGHTER ---
    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function highlightC(code) {
      let res = "";
      let i = 0;
      while (i < code.length) {
        // Comentariu Multi-linie
        if (code.startsWith("/*", i)) {
          let end = code.indexOf("*/", i + 2);
          if (end === -1) end = code.length; else end += 2;
          res += `<span class="syntax-comment">${escapeHtml(code.slice(i, end))}</span>`;
          i = end; continue;
        }
        // Comentariu Single-linie
        if (code.startsWith("//", i)) {
          let end = code.indexOf("\n", i + 2);
          if (end === -1) end = code.length;
          res += `<span class="syntax-comment">${escapeHtml(code.slice(i, end))}</span>`;
          i = end; continue;
        }
        // Directive Preprocesor (#include, #define)
        if (code[i] === '#' && (i === 0 || code[i-1] === '\n')) {
          let end = code.indexOf("\n", i + 1);
          if (end === -1) end = code.length;
          res += `<span class="syntax-preprocessor">${escapeHtml(code.slice(i, end))}</span>`;
          i = end; continue;
        }
        // String-uri ("...")
        if (code[i] === '"') {
          let end = i + 1;
          while(end < code.length && (code[end] !== '"' || code[end-1] === '\\')) end++;
          if (end < code.length) end++;
          res += `<span class="syntax-string">${escapeHtml(code.slice(i, end))}</span>`;
          i = end; continue;
        }
        // Numere (decimale sau hexazecimale)
        if (/\d/.test(code[i]) || (code[i] === '.' && i+1<code.length && /\d/.test(code[i+1]))) {
          let match = code.slice(i).match(/^(0x[0-9a-fA-F]+|\d+(?:\.\d+)?(?:[eE][+-]?\d+)?(?:[uUlLfF]+)?)/);
          if (match) {
             res += `<span class="syntax-number">${match[0]}</span>`;
             i += match[0].length; continue;
          }
        }
        // Cuvinte (Cuvinte cheie, tipuri, funcții, registre)
        if (/[a-zA-Z_]/.test(code[i])) {
          let match = code.slice(i).match(/^[a-zA-Z_]\w*/);
          if (match) {
            let word = match[0];
            let nextStr = code.slice(i + word.length);
            let isFunction = /^\s*\(/.test(nextStr);
            let spanClass = "syntax-text";
            
            const keywordsControl = ['if','else','while','for','switch','case','break','return'];
            const keywordsType = ['int','char','void','long','short','float','double','volatile','static','unsigned'];
            
            if (keywordsControl.includes(word)) {
               spanClass = "syntax-keyword-control";
            } else if (keywordsType.includes(word)) {
               spanClass = "syntax-keyword-type";
            } else if (word === 'ISR') {
               spanClass = "syntax-keyword-control";
            } else if (/^[A-Z][A-Z0-9_]*$/.test(word)) {
               spanClass = "syntax-macro"; // Registre si Macrouri AVR
            } else if (isFunction) {
               spanClass = "syntax-function"; // Functii
            } else {
               spanClass = "syntax-variable"; // Variabile clasice
            }
            
            res += `<span class="${spanClass}">${word}</span>`;
            i += word.length; continue;
          }
        }
        // Operatori C
        if (/[+\-*/%&|^=<>!~]/.test(code[i])) {
          res += `<span class="syntax-operator">${escapeHtml(code[i])}</span>`;
          i++; continue;
        }

        // Restul caracterelor (, ; { } etc)
        res += escapeHtml(code[i]);
        i++;
      }
      return res + (res.endsWith('\n') ? ' ' : '');
    }

    // --- C CODE FORMATTER ---
    function formatCCode(code) {
      const lines = code.split('\n');
      let indentLevel = 0;
      const indentStep = '    '; // 4 spaces
      const result = [];
      
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        
        if (line === '') {
          if (result.length > 0 && result[result.length - 1] !== '') {
            result.push('');
          }
          continue;
        }
        
        let openBraces = 0;
        let closeBraces = 0;
        for (let char of line) {
          if (char === '{') openBraces++;
          if (char === '}') closeBraces++;
        }
        
        let preDecrement = 0;
        if (line.startsWith('}')) {
          preDecrement = closeBraces;
          if (openBraces > 0 && line.endsWith('{')) {
            preDecrement = Math.max(0, closeBraces - openBraces);
          }
        }
        
        let currentIndent = Math.max(0, indentLevel - preDecrement);
        
        const isCaseOrDefault = /^(case\s+[^:]+|default)\s*:/.test(line);
        let renderIndent = currentIndent;
        if (isCaseOrDefault && renderIndent > 0) {
          renderIndent -= 1;
        }
        
        const isPreprocessor = line.startsWith('#');
        const indentStr = isPreprocessor ? '' : indentStep.repeat(renderIndent);
        
        line = line.replace(/\b(if|while|for|switch)\s*\(/g, '$1 (');
        line = line.replace(/\s*\{\s*$/g, ' {');
        
        result.push(indentStr + line);
        
        indentLevel = Math.max(0, indentLevel + openBraces - closeBraces);
      }
      
      for (let i = 0; i < result.length; i++) {
        // Fix indentation for lines inside functions
      }

      while (result.length > 0 && result[result.length - 1] === '') {
        result.pop();
      }
      
      return result.join('\n');
    }

    // --- GET ALTERNATIVES FOR A SOLUTION LINE ---
    function getAlternativesForLine(line) {
      const trimmed = line.trim();
      const alternatives = [];

      // 1. Global variable declaration (symmetric)
      if (/^volatile\s+(?:unsigned\s+)?(?:int|long|short)\s+milisecunde\s*(?:=\s*0)?\s*;/.test(trimmed)) {
        if (trimmed.includes('=')) {
          alternatives.push("volatile unsigned int milisecunde;");
        } else {
          alternatives.push("volatile unsigned int milisecunde = 0;");
        }
      }

      // 2. Bitwise Toggle (XOR) on PC7
      if (/^PORTC\s*\^=\s*\(?\s*1\s*<<\s*7\s*\)?\s*;/.test(trimmed)) {
        alternatives.push("PORTC ^= 1 << 7;");
        alternatives.push("PORTC = PORTC ^ (1 << 7);");
        alternatives.push("PORTC = PORTC ^ 1 << 7;");
        alternatives.push("setbit(PORTC, 7);");
      }

      // 3. setbit(REG, BIT); => alternatives: REG |= (1 << BIT); and REG |= 1 << BIT;
      const macroSetbitMatch = trimmed.match(/^setbit\s*\(\s*([A-Za-z0-9_]+)\s*,\s*([A-Za-z0-9_]+)\s*\)\s*;?/);
      if (macroSetbitMatch) {
        const reg = macroSetbitMatch[1];
        const bit = macroSetbitMatch[2];
        alternatives.push(`${reg} |= (1 << ${bit});`);
        alternatives.push(`${reg} |= 1 << ${bit};`);
      }

      // 4. clrbit(REG, BIT); => alternatives: REG &= ~(1 << BIT);
      const macroClrbitMatch = trimmed.match(/^clrbit\s*\(\s*([A-Za-z0-9_]+)\s*,\s*([A-Za-z0-9_]+)\s*\)\s*;?/);
      if (macroClrbitMatch) {
        const reg = macroClrbitMatch[1];
        const bit = macroClrbitMatch[2];
        alternatives.push(`${reg} &= ~(1 << ${bit});`);
      }

      // 5. testbit(PIN, BIT) in conditions => alternatives: (PIN & (1 << BIT))
      const testbitRegex = /testbit\s*\(\s*([A-Za-z0-9_]+)\s*,\s*([A-Za-z0-9_]+)\s*\)/g;
      if (testbitRegex.test(trimmed)) {
        testbitRegex.lastIndex = 0;
        const replaced = trimmed.replace(testbitRegex, (_, reg, bit) => `(${reg} & (1 << ${bit}))`);
        alternatives.push(replaced);
      }

      // 6. DDRx or PORTx or TIMSK |= (1 << BIT) => alternatives: setbit(REG, BIT);
      const setbitMatch = trimmed.match(/^([A-Za-z0-9_]+)\s*\|=\s*\(?\s*1\s*<<\s*([A-Za-z0-9_]+)\s*\)?\s*;/);
      if (setbitMatch) {
        const reg = setbitMatch[1];
        const bit = setbitMatch[2];
        alternatives.push(`setbit(${reg}, ${bit});`);
      }

      // 7. REG &= ~(1 << BIT) => alternatives: clrbit(REG, BIT);
      const clrbitMatch = trimmed.match(/^([A-Za-z0-9_]+)\s*&=\s*~\s*\(?\s*1\s*<<\s*([A-Za-z0-9_]+)\s*\)?\s*;/);
      if (clrbitMatch) {
        const reg = clrbitMatch[1];
        const bit = clrbitMatch[2];
        alternatives.push(`clrbit(${reg}, ${bit});`);
      }

      // 8. Button reading / pin reading (masking) in conditions: (PIN & (1 << BIT)) => testbit(PIN, BIT)
      const pinReadRegex = /\((PIN[A-D])\s*&\s*\(\s*1\s*<<\s*(\d+)\s*\)\)/g;
      if (pinReadRegex.test(trimmed)) {
        pinReadRegex.lastIndex = 0;
        const replaced = trimmed.replace(pinReadRegex, (_, pin, bit) => `testbit(${pin}, ${bit})`);
        alternatives.push(replaced);
      }

      return alternatives;
    }

    const formatSolutionCode = (solutionText, showComments) => {
      if (showComments) {
        return solutionText;
      }
      return solutionText.split('\n').map(line => {

        const idx = line.indexOf('//');
        if (idx !== -1) {
          return line.substring(0, idx).trimEnd();
        }
        return line;
      }).join('\n');
    };

      const handleKeyDown = (e) => {
        const textarea = e.target;
        const { selectionStart, selectionEnd, value } = textarea;
        
        if (e.key === 'Tab') {
          e.preventDefault();
          if (e.shiftKey) {
            // Outdent
            const currentLineStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
            const currentLine = value.substring(currentLineStart, selectionStart);
            
            let spacesToRemove = 0;
            if (currentLine.startsWith('    ')) {
              spacesToRemove = 4;
            } else {
              const match = currentLine.match(/^ +/);
              if (match) {
                spacesToRemove = match[0].length;
              }
            }
            
            if (spacesToRemove > 0) {
              textarea.setSelectionRange(currentLineStart, currentLineStart + spacesToRemove);
              document.execCommand('delete');
              textarea.setSelectionRange(selectionStart - spacesToRemove, selectionStart - spacesToRemove);
            }
          } else {
            // Indent
            document.execCommand('insertText', false, '    ');
          }
          return;
        }
        
        // Auto-close pairs
        const pairs = {
          '{': '}',
          '(': ')',
          '[': ']',
          '"': '"',
          "'": "'",
        };
        
        if (pairs[e.key] !== undefined) {
          e.preventDefault();
          const char = e.key;
          const closingChar = pairs[char];
          
          if (selectionStart !== selectionEnd) {
            const selectedText = value.substring(selectionStart, selectionEnd);
            document.execCommand('insertText', false, char + selectedText + closingChar);
            textarea.setSelectionRange(selectionStart + 1, selectionEnd + 1);
          } else {
            document.execCommand('insertText', false, char + closingChar);
            textarea.setSelectionRange(selectionStart + 1, selectionStart + 1);
          }
          return;
        }
        
        // Skip typing a closing bracket if it's already there
        const closers = ['}', ')', ']', '"', "'"];
        if (closers.includes(e.key) && value[selectionStart] === e.key) {
          e.preventDefault();
          textarea.setSelectionRange(selectionStart + 1, selectionStart + 1);
          return;
        }
        
        // Deleting pairs on Backspace
        if (e.key === 'Backspace' && selectionStart === selectionEnd) {
          const prevChar = value[selectionStart - 1];
          const nextChar = value[selectionStart];
          if (
            (prevChar === '{' && nextChar === '}') ||
            (prevChar === '(' && nextChar === ')') ||
            (prevChar === '[' && nextChar === ']') ||
            (prevChar === '"' && nextChar === '"') ||
            (prevChar === "'" && nextChar === "'")
          ) {
            e.preventDefault();
            textarea.setSelectionRange(selectionStart - 1, selectionStart + 1);
            document.execCommand('delete');
            return;
          }
        }
        
        // Auto-indent on Enter
        if (e.key === 'Enter') {
          e.preventDefault();
          const currentLineStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
          const currentLine = value.substring(currentLineStart, selectionStart);
          const leadingSpacesMatch = currentLine.match(/^\s*/);
          const leadingSpaces = leadingSpacesMatch ? leadingSpacesMatch[0] : '';
          
          let extraIndent = '';
          const trimmedLine = currentLine.trim();
          if (trimmedLine.endsWith('{')) {
            extraIndent = '    ';
          }
          
          let inserted = '\n' + leadingSpaces + extraIndent;
          const nextChar = value[selectionStart];
          let adjustCursor = 0;
          
          if (trimmedLine.endsWith('{') && nextChar === '}') {
            inserted += '\n' + leadingSpaces;
            adjustCursor = - (leadingSpaces.length + 1);
          }
          
          document.execCommand('insertText', false, inserted);
          if (adjustCursor !== 0) {
            const newPos = selectionStart + inserted.length + adjustCursor;
            textarea.setSelectionRange(newPos, newPos);
          }
          return;
        }
        
        // Ctrl + / toggle comments
        if (e.key === '/' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          const currentLineStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
          let currentLineEnd = value.indexOf('\n', selectionStart);
          if (currentLineEnd === -1) currentLineEnd = value.length;
          
          const currentLine = value.substring(currentLineStart, currentLineEnd);
          let newLine;
          
          if (currentLine.trim().startsWith('//')) {
            newLine = currentLine.replace('// ', '').replace('//', '');
          } else {
            const match = currentLine.match(/^(\s*)/);
            const ws = match ? match[1] : '';
            newLine = ws + '// ' + currentLine.substring(ws.length);
          }
          
          textarea.setSelectionRange(currentLineStart, currentLineEnd);
          document.execCommand('insertText', false, newLine);
          
          const cursorOffset = newLine.length - currentLine.length;
          const newCursorPos = selectionStart + cursorOffset;
          textarea.setSelectionRange(newCursorPos, newCursorPos);
          return;
        }
      };

      const verifyCode = () => {
        const newFeedback = problem.checks.map(check => {
          const isPassed = typeof check.test === 'function' ? check.test(code) : (check.regex ? check.regex.test(code) : false);
          return { desc: check.desc, passed: isPassed };
        });
        setFeedback(newFeedback);
      };

      const isAllPassed = feedback.length > 0 && feedback.every(f => f.passed);

      return (
        <div class="min-h-screen bg-slate-50 flex flex-col font-sans animate-fade-in">
          
          {/* Header */}
          <header class="bg-slate-900 border-b border-slate-800 text-white px-6 py-4 shadow-lg flex justify-between items-center z-20">
            <div class="flex items-center space-x-3">
              <a 
                href="../index.html" 
                title="Înapoi la Panou" 
                className="mr-2 p-1.5 rounded-lg bg-slate-850 hover:bg-slate-800 text-slate-400 hover:text-white border border-slate-800 hover:border-slate-750 transition-all duration-150 flex items-center justify-center active:scale-95 shadow-inner"
              >
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
              </a>
              <div class="bg-violet-600/30 border border-violet-500/50 p-2 rounded-lg text-violet-400">
                <Code className="w-6 h-6" />
              </div>
              <div>
                <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">
                  AVR Periferice & FSM Trainer
                </h1>
                <p class="text-xs text-slate-400 font-medium tracking-wide uppercase">ATmega16 Platform</p>
              </div>
            </div>

            {/* Problem Navigation Tabs */}
            <div class="hidden md:flex space-x-1.5 bg-slate-950/40 p-1 rounded-xl border border-slate-800">
              {problems.map((prob, i) => (
                <button
                  key={i}
                  onClick={() => selectProblem(i)}
                  class={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${
                    problemIndex === i 
                      ? 'bg-violet-600 text-white shadow-md' 
                      : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'
                  }`}
                >
                  T{i+1}
                </button>
              ))}
            </div>
            
            <button 
              onClick={loadNextProblem}
              class="flex items-center space-x-2 bg-gradient-to-r from-violet-600 to-violet-750 hover:from-violet-500 hover:to-violet-650 text-white px-5 py-2.5 rounded-lg shadow-lg hover:shadow-violet-500/20 active:scale-95 transition-all duration-155 font-semibold text-sm"
            >
              <RotateCcw className="w-4 h-4" />
              <span>Problema Următoare</span>
            </button>
          </header>

          {/* Mobile Problem Picker */}
          <div class="flex md:hidden bg-slate-850 border-b border-slate-800 p-2 justify-around text-slate-400 text-xs font-semibold z-10">
            {problems.map((prob, i) => (
              <button
                key={i}
                onClick={() => selectProblem(i)}
                class={`px-3 py-1 rounded ${problemIndex === i ? 'bg-violet-600 text-white font-bold' : ''}`}
              >
                P{i+1}
              </button>
            ))}
          </div>

          {/* Main Content */}
          <main class={`flex-1 flex flex-col lg:flex-row overflow-hidden relative ${isResizing ? 'select-none' : ''}`}>
            
            {/* Left Panel: Instructions & Feedback */}
            <section 
              style={{ width: isLeftCollapsed ? 0 : `${leftWidth}px`, display: isLeftCollapsed ? 'none' : 'flex' }}
              class="bg-white border-r border-slate-200 p-6 flex flex-col overflow-y-auto z-10 shadow-sm transition-all duration-150 relative shrink-0"
            >
              
              <div class="mb-6">
                <div class="flex justify-between items-center mb-3">
                  <span class="inline-block px-3 py-1 bg-violet-50 text-violet-700 border border-violet-100 text-[10px] font-bold rounded-md uppercase tracking-wider">
                    {problem.type}
                  </span>
                  <button
                    onClick={() => setIsLeftCollapsed(true)}
                    title="Ascunde panoul stâng"
                    class="p-1 rounded-md text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
                  >
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                  </button>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight leading-snug mb-4">{problem.title}</h2>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-slate-600 whitespace-pre-wrap leading-relaxed text-sm font-medium">
                  {problem.task}
                </div>
              </div>

              <div class="mb-6">
                <button 
                  onClick={verifyCode}
                  class="w-full flex items-center justify-center space-x-2 bg-slate-900 hover:bg-slate-850 text-white py-3.5 rounded-xl font-bold hover:shadow-lg hover:shadow-slate-900/10 active:scale-[0.98] transition-all duration-150"
                >
                  <Play className="w-4 h-4 text-emerald-400" />
                  <span>Verifică Soluția</span>
                </button>
              </div>

              {feedback.length > 0 && (
                <div class="mb-6 space-y-3 animate-slide-in">
                  <h3 class="font-bold text-slate-800 text-sm flex items-center tracking-wide uppercase">
                    {isAllPassed ? (
                      <span class="flex items-center text-emerald-600">
                        <CheckCircle className="w-5 h-5 text-emerald-500 mr-2 shrink-0" />
                        Felicitări! Soluție Corectă
                      </span>
                    ) : (
                      <span class="flex items-center text-rose-600">
                        <XCircle className="w-5 h-5 text-rose-500 mr-2 shrink-0" />
                        Verificare Eșuată
                      </span>
                    )}
                  </h3>
                  <ul class="space-y-2">
                    {feedback.map((item, idx) => (
                      <li key={idx} class={`flex items-start space-x-3 p-3.5 rounded-xl border transition-all duration-200 ${item.passed ? 'bg-emerald-50/50 border-emerald-100' : 'bg-rose-50/30 border-rose-100'}`}>
                        {item.passed ? 
                          <CheckCircle className="w-4 h-4 text-emerald-500 shrink-0 mt-0.5" /> : 
                          <XCircle className="w-4 h-4 text-rose-400 shrink-0 mt-0.5" />
                        }
                        <span class={`text-xs leading-relaxed ${item.passed ? 'text-slate-600' : 'text-slate-700 font-medium'}`}>
                          {item.desc}
                        </span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}

              <div class="mt-auto pt-6 border-t border-slate-100">
                <button 
                  onClick={() => setShowSolution(!showSolution)}
                  class="flex items-center text-violet-600 hover:text-violet-750 font-semibold text-sm transition-colors"
                >
                  <BookOpen className="w-4 h-4 mr-2" />
                  {showSolution ? "Ascunde Ghidul" : "Arată Ghidul și Soluția"}
                </button>
                
                {showSolution && (
                  <div class="mt-4 bg-violet-50/50 border border-violet-100 rounded-xl p-4 text-xs space-y-3 animate-slide-in">
                    <div>
                      <h4 class="font-bold text-violet-900 mb-1 uppercase tracking-wider text-[10px]">Ghid de rezolvare</h4>
                      <p class="text-violet-800/95 whitespace-pre-wrap leading-relaxed">{problem.guide}</p>
                    </div>
                    <div>
                      <div class="flex justify-between items-center mb-1.5">
                        <h4 class="font-bold text-violet-900 mb-0 uppercase tracking-wider text-[10px]">Soluție Corectă</h4>
                        <button
                          onClick={() => setShowComments(!showComments)}
                          class={`flex items-center space-x-1.5 px-2 py-1 rounded transition-all text-[9.5px] font-bold uppercase tracking-wider ${
                            showComments
                              ? 'bg-violet-650 border border-violet-700 text-white shadow-sm'
                              : 'bg-violet-50 hover:bg-violet-100 border border-violet-100 text-violet-700'
                          }`}
                        >
                          <svg class="w-3 h-3 text-violet-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                          </svg>
                          <span>{showComments ? 'Cu comentarii' : 'Fără comentarii'}</span>
                        </button>
                      </div>
                      <div class="bg-[#1e1e1e] text-[#D4D4D4] p-3.5 rounded-lg overflow-x-auto font-mono text-[11px] leading-relaxed shadow-inner flex flex-col">
                        {formatSolutionCode(problem.solution, showComments).split('\n').map((line, idx) => (
                          <SolutionLine key={idx} line={line} />
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>

            </section>
            
            {/* Resizer Handle */}
            {!isLeftCollapsed && (
              <div
                onMouseDown={startResize}
                class={`hidden lg:block w-1 hover:w-1.5 bg-slate-200 hover:bg-violet-500 cursor-col-resize select-none transition-all duration-150 z-20 ${isResizing ? 'bg-violet-600 w-1.5' : ''}`}
              />
            )}
            
            {/* Right Panel: Code Editor */}
            <section class={`flex-1 bg-[#1e1e1e] flex flex-col overflow-hidden relative shadow-inner ${isResizing ? 'pointer-events-none' : ''}`}>
              <div class="bg-[#181818] px-6 py-3 border-b border-slate-800/80 flex justify-between items-center text-slate-400 text-xs font-mono select-none">
                <span class="flex items-center space-x-2">
                  {isLeftCollapsed && (
                    <button
                      onClick={() => setIsLeftCollapsed(false)}
                      title="Arată panoul stâng"
                      class="mr-3 p-1 rounded bg-slate-855 hover:bg-slate-700 text-violet-400 hover:text-violet-300 transition-colors flex items-center justify-center"
                    >
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                      </svg>
                    </button>
                  )}
                  <span class="w-2.5 h-2.5 rounded-full bg-violet-550"></span>
                  <span class="font-medium text-slate-300">main.c</span>
                </span>
                
                <div class="flex items-center space-x-4">
                  <button
                    onClick={() => setCode(formatCCode(code))}
                    title="Formatează Codul"
                    class="flex items-center space-x-1.5 px-3 py-1.5 rounded bg-[#25252b] hover:bg-slate-800 hover:text-white text-slate-300 transition-all border border-slate-800/80 hover:border-slate-700 active:scale-95 text-[11px] font-semibold font-sans"
                  >
                    <svg class="w-3.5 h-3.5 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.656 48.656 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3M3 12a48.654 48.654 0 011.04-6.62M3 12l3 3m-3-3l-3 3M6.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM10.5 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM14.25 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
                    </svg>
                    <span>Formatează</span>
                  </button>
                  <span class="text-[10px] text-slate-500 uppercase tracking-widest">AVR-GCC C99</span>
                </div>
              </div>
              <div class="flex-1 flex overflow-hidden relative">
                {/* Line Numbers Column */}
                <div 
                  id="line-numbers"
                  class="w-12 bg-[#1c1c1c] text-[#5a5a5a] font-mono text-[15px] py-6 pr-3 text-right select-none border-r border-slate-800/40 overflow-hidden h-full"
                >
                  {code.split('\n').map((_, index) => (
                    <div key={index}>{index + 1}</div>
                  ))}
                </div>
                
                {/* Editor Container */}
                <div class="flex-1 relative overflow-hidden h-full">
                  <textarea
                    value={code}
                    onChange={(e) => setCode(e.target.value)}
                    onKeyDown={handleKeyDown}
                    onScroll={(e) => {
                      const pre = document.getElementById('syntax-pre');
                      if (pre) {
                        pre.scrollTop = e.target.scrollTop;
                        pre.scrollLeft = e.target.scrollLeft;
                      }
                      const lineNumbers = document.getElementById('line-numbers');
                      if (lineNumbers) {
                        lineNumbers.scrollTop = e.target.scrollTop;
                      }
                    }}
                    spellCheck="false"
                    class="absolute inset-0 w-full h-full py-6 px-4 bg-transparent text-transparent caret-violet-400 outline-none resize-none whitespace-pre font-mono text-[15px] leading-relaxed z-10"
                    style={{ tabSize: 4 }}
                  />
                  <pre
                    id="syntax-pre"
                    class="absolute inset-0 w-full h-full py-6 px-4 pointer-events-none whitespace-pre overflow-hidden font-mono text-[15px] leading-relaxed z-0"
                    style={{ tabSize: 4 }}
                    dangerouslySetInnerHTML={{ __html: highlightC(code) }}
                  />
                </div>
              </div>
            </section>

          </main>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
