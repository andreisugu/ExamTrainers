  <!-- React & ReactDOM UMD -->

<body class="circuit-grid min-h-full font-sans text-slate-200 overflow-x-hidden selection:bg-indigo-500 selection:text-white">

  <div id="root" class="min-h-screen flex flex-col justify-between"></div>

  <!-- TSX Code Block -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- ICONS ---
    const CpuIcon = () => (
      <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
      </svg>
    );

    const WarningIcon = () => (
      <svg class="w-5 h-5 text-amber-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    const BookIcon = () => (
      <svg class="w-5 h-5 text-indigo-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    );

    const CalculatorIcon = () => (
      <svg class="w-5 h-5 text-violet-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
      </svg>
    );

    const TerminalIcon = () => (
      <svg class="w-5 h-5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    const CheckIcon = () => (
      <svg class="w-4 h-4 text-emerald-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    );

    const CrossIcon = () => (
      <svg class="w-4 h-4 text-rose-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    );

    // --- APP COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState('bugs'); // 'bugs', 'memories', 'ports', 'bitwise'

      // Memory decodifier calculator states
      const [calcSize, setCalcSize] = useState(8); // in KB
      const [calcAddress, setCalcAddress] = useState('0x6000');
      const [calcError, setCalcError] = useState('');

      // Memory decodifier practice states
      const [practiceQuestion, setPracticeQuestion] = useState(null);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [showAnswerFeedback, setShowAnswerFeedback] = useState(false);
      const [score, setScore] = useState(0);

      // Ports quiz states
      const [quizAnswers, setQuizAnswers] = useState({ q1: null, q2: null, q3: null });
      const [showQuizResults, setShowQuizResults] = useState(false);

      // Copy to clipboard helper
      const [copiedText, setCopiedText] = useState('');
      const handleCopy = (text, id) => {
        navigator.clipboard.writeText(text);
        setCopiedText(id);
        setTimeout(() => setCopiedText(''), 2000);
      };

      // Memory calculator logic
      const calculationResult = useMemo(() => {
        setCalcError('');
        const cleanHex = calcAddress.trim().replace(/^0x/i, '');
        const baseAddr = parseInt(cleanHex, 16);
        if (isNaN(baseAddr) || cleanHex.length === 0) {
          setCalcError('Adresă hexazecimală invalidă (ex: 0x6000)');
          return null;
        }
        if (baseAddr < 0 || baseAddr > 0xFFFF) {
          setCalcError('Adresa trebuie să fie în intervalul 0x0000 - 0xFFFF (pe 16 biți)');
          return null;
        }

        const bytes = calcSize * 1024;
        const addressLines = Math.log2(bytes);
        
        // Base address must be aligned to memory size
        if (baseAddr % bytes !== 0) {
          setCalcError(`Atenție! Adresa de bază 0x${baseAddr.toString(16).toUpperCase()} nu este aliniată la dimensiunea de ${calcSize} KB (multiplu de ${bytes} bytes / 0x${bytes.toString(16).toUpperCase()})`);
        }

        const freeLines = [];
        for (let i = 15; i >= addressLines; i--) {
          freeLines.push(i);
        }

        const binaryString = baseAddr.toString(2).padStart(16, '0');
        const freeLineValues = {};
        freeLines.forEach(line => {
          freeLineValues[line] = parseInt(binaryString[15 - line]);
        });

        // Generate equation representations
        const eqTerms = freeLines.map(line => {
          const val = freeLineValues[line];
          return val === 0 ? `A${line}'` : `A${line}`;
        });
        const equationString = eqTerms.join(' · ');

        // HTML Representation with styled overlines
        const equationHtml = (
          <span class="inline-flex items-center">
            <span class="border-t border-slate-300 pt-0.5 mr-1 font-bold">CS</span>
            <span class="mr-2 font-bold">=</span>
            <span class="border-t border-slate-300 pt-0.5 inline-flex gap-1 font-bold">
              {freeLines.map((line, idx) => {
                const val = freeLineValues[line];
                return (
                  <span key={line} class="inline-flex">
                    {val === 0 ? (
                      <span class="border-t border-slate-400 pt-0.5">A<sub>{line}</sub></span>
                    ) : (
                      <span>A<sub>{line}</sub></span>
                    )}
                    {idx < freeLines.length - 1 && <span class="mx-1 text-slate-500">·</span>}
                  </span>
                );
              })}
            </span>
          </span>
        );

        return {
          bytes,
          addressLines,
          freeLines,
          binaryString,
          freeLineValues,
          equationString,
          equationHtml
        };
      }, [calcSize, calcAddress]);

      // Memory decodifier practice generator
      const generateNewPractice = () => {
        const sizes = [2, 4, 8, 16];
        const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
        const bytes = randomSize * 1024;
        
        // Get all valid base addresses that fit in 16-bit space
        const maxMult = Math.floor(0xFFFF / bytes);
        // Avoid 0x0000 to keep it interesting
        const mult = Math.floor(Math.random() * maxMult) + 1;
        const baseAddr = mult * bytes;
        const hexAddress = `0x${baseAddr.toString(16).toUpperCase()}`;

        // Calculate correct solution
        const addressLines = Math.log2(bytes);
        const freeLines = [];
        for (let i = 15; i >= addressLines; i--) {
          freeLines.push(i);
        }
        const binaryString = baseAddr.toString(2).padStart(16, '0');
        const correctTerms = freeLines.map(line => {
          const val = parseInt(binaryString[15 - line]);
          return val === 0 ? `A${line}'` : `A${line}`;
        });
        const correctEq = `CS = /(${correctTerms.join(' . ')})`;

        // Helper to generate a random option
        const makeOptionText = (size, addr) => {
          const lAddressLines = Math.log2(size * 1024);
          const lFreeLines = [];
          for (let i = 15; i >= lAddressLines; i--) {
            lFreeLines.push(i);
          }
          const lBinaryString = addr.toString(2).padStart(16, '0');
          const terms = lFreeLines.map(line => {
            // Randomly flip negations sometimes
            let val = parseInt(lBinaryString[15 - line]);
            if (Math.random() > 0.6) {
              val = 1 - val;
            }
            return val === 0 ? `A${line}'` : `A${line}`;
          });
          return `CS = /(${terms.join(' · ')})`;
        };

        const answers = new Set();
        answers.add(`CS = /(${correctTerms.join(' · ')})`);

        // Generate distractors
        while (answers.size < 4) {
          // Distractor 1: wrong negations
          const badTerms = freeLines.map(line => {
            const val = parseInt(binaryString[15 - line]);
            // invert one specific bit or randomly
            const inverted = Math.random() > 0.5 ? 1 - val : val;
            return inverted === 0 ? `A${line}'` : `A${line}`;
          });
          answers.add(`CS = /(${badTerms.join(' · ')})`);

          // Distractor 2: off-by-one address line count
          const wrongSize = randomSize === 16 ? 8 : randomSize * 2;
          const badSizeAddrLines = Math.log2(wrongSize * 1024);
          const badFreeLines = [];
          for (let i = 15; i >= badSizeAddrLines; i--) {
            badFreeLines.push(i);
          }
          const badSizeTerms = badFreeLines.map(line => {
            const val = parseInt(binaryString[15 - line] || '0');
            return val === 0 ? `A${line}'` : `A${line}`;
          });
          answers.add(`CS = /(${badSizeTerms.join(' · ')})`);
        }

        const optionsArray = Array.from(answers);
        // Shuffle
        for (let i = optionsArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [optionsArray[i], optionsArray[j]] = [optionsArray[j], optionsArray[i]];
        }

        setPracticeQuestion({
          size: randomSize,
          addressHex: hexAddress,
          correctAnswer: `CS = /(${correctTerms.join(' · ')})`,
          options: optionsArray
        });
        setSelectedAnswer(null);
        setShowAnswerFeedback(false);
      };

      // Generate initial practice question
      useEffect(() => {
        generateNewPractice();
      }, []);

      const handlePracticeSubmit = (option) => {
        if (showAnswerFeedback) return;
        setSelectedAnswer(option);
        setShowAnswerFeedback(true);
        if (option === practiceQuestion.correctAnswer) {
          setScore(score + 10);
        } else {
          setScore(Math.max(0, score - 5));
        }
      };

      // Quiz Questions (Ports Section)
      const quizQuestions = [
        {
          id: 'q1',
          question: 'Cum configurezi pinul PD2 ca intrare cu rezistență de pull-up internă activată în AVR?',
          options: [
            'DDRD &= ~(1 << PD2); PORTD |= (1 << PD2);',
            'DDRD |= (1 << PD2); PORTD |= (1 << PD2);',
            'DDRD &= ~(1 << PD2); PORTD &= ~(1 << PD2);',
            'DDRD |= (1 << PD2); PORTD &= ~(1 << PD2);'
          ],
          correct: 0,
          explanation: 'Direcția se pune pe 0 în DDRD pentru a fi intrare: DDRD &= ~(1<<PD2). Apoi activarea rezistenței de pull-up se face scriind 1 în PORTD pe pinul respectiv: PORTD |= (1<<PD2).'
        },
        {
          id: 'q2',
          question: 'Dacă un buton este conectat cu Pull-Up intern activ (activ pe 0), ce valoare citești în PINA când butonul este APĂSAT?',
          options: [
            '1 logic',
            '0 logic',
            'Stare de înaltă impedanță (Hi-Z)',
            '255 (toți biții pe 1)'
          ],
          correct: 1,
          explanation: 'La apăsarea unui buton activ pe 0 (conectat la GND), pinul este legat fizic la masă, deci citirea registerului PINA pe pinul respectiv va returna valoarea 0 logic.'
        },
        {
          id: 'q3',
          question: 'Care este diferența corectă între operatorii bitwise ~ și logic ! în C?',
          options: [
            '~ face negare logică (0 sau 1), iar ! inversează toți biții individuali ai unei variabile.',
            '~ (tilda) inversează fiecare bit individual din variabilă (0 devine 1 și invers), în timp ce ! (semnul exclamării) transformă orice valoare non-zero în 0 logic (și 0 în 1 logic).',
            'Sunt complet echivalenți și pot fi folosiți interschimbabil în orice situație.',
            '~ se folosește doar în directivele preprocesor, iar ! doar în buclele while.'
          ],
          correct: 1,
          explanation: '~ este operatorul bitwise (negare pe biți, util pentru măști: PORT &= ~(1<<5)). ! este operatorul logic utilizat pentru evaluarea condițiilor logice booleene.'
        }
      ];

      const checkQuiz = () => {
        setShowQuizResults(true);
      };

      const resetQuiz = () => {
        setQuizAnswers({ q1: null, q2: null, q3: null });
        setShowQuizResults(false);
      };

      return (
        <div class="flex-1 flex flex-col justify-between">
          <main class="relative mx-auto flex w-full max-w-6xl flex-col px-4 py-8 sm:px-6 lg:px-8 justify-between animate-fade-in">
            
            {/* Top Header / Nav */}
            <header class="flex items-center justify-between mb-8">
              <nav class="flex items-center space-x-2 text-sm text-slate-400 font-medium">
                <a href="../index.html" class="flex items-center hover:text-white transition-colors duration-150 py-1 px-2 rounded-md hover:bg-white/5">
                  <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                  </svg>
                  Microprocesoare Hub
                </a>
                <span class="text-slate-600 font-semibold">/</span>
                <span class="text-indigo-400 font-bold bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20">Setup & Ziua 0</span>
              </nav>

              <div class="hidden sm:flex items-center space-x-2 text-xs text-slate-400 bg-slate-900/60 border border-slate-800 rounded-full px-3 py-1.5 backdrop-blur-md">
                <span class="w-2 h-2 rounded-full bg-violet-500 animate-pulse"></span>
                <span class="font-semibold uppercase tracking-wider">Capitolul 1: Fundamente</span>
              </div>
            </header>

            {/* Hero Section */}
            <section class="text-center sm:text-left mb-8 space-y-3">
              <div class="inline-flex items-center gap-2 rounded-full border border-violet-500/30 bg-violet-500/10 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-violet-400">
                🚀 MEGA-MATERIAL ZIUA 0
              </div>
              <h1 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl bg-gradient-to-r from-white via-slate-100 to-indigo-200 bg-clip-text text-transparent">
                Setup-ul și Terenul Minat
              </h1>
              <p class="max-w-3xl text-sm text-slate-400 leading-relaxed font-medium">
                Învață bazele hardware esențiale pentru examen: configurarea mediului, decodificarea memoriilor (RAM/ROM), emularea funcțiilor logice pe porturi și manipularea biților.
              </p>
            </section>

            {/* Tab Navigation Menu */}
            <nav class="flex overflow-x-auto border-b border-slate-800/80 mb-8 pb-px gap-2 scrollbar-none">
              <button 
                onClick={() => setActiveTab('bugs')}
                class={`flex items-center space-x-2 px-4 py-3 border-b-2 font-bold text-xs uppercase tracking-wider transition-all whitespace-nowrap ${
                  activeTab === 'bugs' 
                    ? 'border-indigo-500 text-indigo-400 bg-indigo-500/5' 
                    : 'border-transparent text-slate-400 hover:text-slate-200'
                }`}
              >
                <WarningIcon />
                <span>Terenul Minat (Bugs)</span>
              </button>
              <button 
                onClick={() => setActiveTab('memories')}
                class={`flex items-center space-x-2 px-4 py-3 border-b-2 font-bold text-xs uppercase tracking-wider transition-all whitespace-nowrap ${
                  activeTab === 'memories' 
                    ? 'border-indigo-500 text-indigo-400 bg-indigo-500/5' 
                    : 'border-transparent text-slate-400 hover:text-slate-200'
                }`}
              >
                <CalculatorIcon />
                <span>Decodificarea Memoriilor (T1)</span>
              </button>
              <button 
                onClick={() => setActiveTab('ports')}
                class={`flex items-center space-x-2 px-4 py-3 border-b-2 font-bold text-xs uppercase tracking-wider transition-all whitespace-nowrap ${
                  activeTab === 'ports' 
                    ? 'border-indigo-500 text-indigo-400 bg-indigo-500/5' 
                    : 'border-transparent text-slate-400 hover:text-slate-200'
                }`}
              >
                <TerminalIcon />
                <span>Logica pe Porturi (T2)</span>
              </button>
              <button 
                onClick={() => setActiveTab('bitwise')}
                class={`flex items-center space-x-2 px-4 py-3 border-b-2 font-bold text-xs uppercase tracking-wider transition-all whitespace-nowrap ${
                  activeTab === 'bitwise' 
                    ? 'border-indigo-500 text-indigo-400 bg-indigo-500/5' 
                    : 'border-transparent text-slate-400 hover:text-slate-200'
                }`}
              >
                <BookIcon />
                <span>Bitwise Cheat Sheet</span>
              </button>
            </nav>

            {/* TAB CONTENTS */}
            <div class="space-y-8 min-h-[500px]">
              
              {/* TAB 1: TERENUL MINAT (BUGS SIMULIDE) */}
              {activeTab === 'bugs' && (
                <section class="space-y-6 animate-slide-up">
                  <div class="bg-amber-500/10 border border-amber-500/25 rounded-2xl p-5 flex items-start gap-4 shadow-sm backdrop-blur-md">
                    <div class="p-3 bg-amber-500/15 rounded-xl text-amber-400">
                      <WarningIcon />
                    </div>
                    <div>
                      <h3 class="text-base font-bold text-amber-400 mb-1">Terenul Minat: Cele 3 Erori ale Simulatorului SimulIDE</h3>
                      <p class="text-xs text-slate-350 leading-relaxed font-medium">
                        La examen scrii codul corect pe foaie, dar dacă te antrenezi acasă în simulatorul SimulIDE și nu ții cont de aceste 3 bug-uri, vei pierde ore întregi crezând că ai greșit.
                      </p>
                    </div>
                  </div>

                  <div class="grid gap-6 md:grid-cols-3">
                    
                    {/* Bug 1 */}
                    <article class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 hover:border-slate-700/80 transition-all backdrop-blur-sm space-y-3">
                      <div class="flex items-center justify-between">
                        <span class="text-[10px] font-bold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20 uppercase">Bug 1</span>
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
                      </div>
                      <h4 class="text-sm font-bold text-white">Timer 0 NU merge în CTC</h4>
                      <p class="text-xs text-slate-400 leading-relaxed font-medium">
                        În simulator, Timer 0 <strong>nu</strong> generează întreruperi în modul de comparare CTC. Pentru ceasuri exacte și temporizări corecte, utilizează întotdeauna <strong>Timer 1</strong> sau <strong>Timer 2</strong>.
                      </p>
                      <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800 text-[11px] font-mono text-indigo-300">
                        // Timer 0 -> PWM doar<br/>
                        // Timer 1 & 2 -> CTC
                      </div>
                    </article>

                    {/* Bug 2 */}
                    <article class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 hover:border-slate-700/80 transition-all backdrop-blur-sm space-y-3">
                      <div class="flex items-center justify-between">
                        <span class="text-[10px] font-bold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20 uppercase">Bug 2</span>

                      </p>
                      <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800 space-y-1">
                        <div class="flex justify-between items-center text-[10px] text-slate-500 font-mono mb-1">
                          <span>AVR-GCC Example</span>
                          <button onClick={() => handleCopy('PORTC |= (1 << 5);', 'c_set')} class="hover:text-white transition-colors">{copiedText === 'c_set' ? 'Copiat!' : 'Copy'}</button>
                        </div>
                        <code class="text-indigo-300 font-mono text-[11px]">PORTC |= (1 &lt;&lt; 5); <span class="text-slate-600">// PC5 devine 1</span></code>
                      </div>
                    </article>

                    {/* CLEAR bit */}
                    <article class="bg-slate-900/40 border border-slate-800 rounded-3xl p-5 space-y-3 hover:border-slate-700/80 transition-all">
                      <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-white bg-slate-950 border border-slate-800 px-2.5 py-1 rounded-lg font-mono">CLEAR (0)</span>
                        <span class="text-emerald-400 font-bold text-xs uppercase tracking-wider">Bit &amp;= ~(1 &lt;&lt; Pin)</span>
                      </div>
                      <p class="text-xs text-slate-400 leading-relaxed font-medium">
                        Pune un bit pe valoarea <strong>0 logic</strong> folosind operatorul ȘI cu masca negat-inversată (&amp;= ~).
                      </p>
                      <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800 space-y-1">
                        <div class="flex justify-between items-center text-[10px] text-slate-500 font-mono mb-1">
                          <span>AVR-GCC Example</span>
                          <button onClick={() => handleCopy('PORTC &= ~(1 << 5);', 'c_clear')} class="hover:text-white transition-colors">{copiedText === 'c_clear' ? 'Copiat!' : 'Copy'}</button>
                        </div>
                        <code class="text-indigo-300 font-mono text-[11px]">PORTC &amp;= ~(1 &lt;&lt; 5); <span class="text-slate-600">// PC5 devine 0</span></code>
                      </div>
                    </article>

                    {/* TOGGLE bit */}
                    <article class="bg-slate-900/40 border border-slate-800 rounded-3xl p-5 space-y-3 hover:border-slate-700/80 transition-all">
                      <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-white bg-slate-950 border border-slate-800 px-2.5 py-1 rounded-lg font-mono">TOGGLE</span>
                        <span class="text-emerald-400 font-bold text-xs uppercase tracking-wider">Bit ^= (1 &lt;&lt; Pin)</span>
                      </div>
                      <p class="text-xs text-slate-400 leading-relaxed font-medium">
                        Inversează starea actuală a unui bit (XOR pe biți: ^=). Dacă era aprins/1 se stinge, dacă era stins/0 se aprinde.
                      </p>
                      <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800 space-y-1">
                        <div class="flex justify-between items-center text-[10px] text-slate-500 font-mono mb-1">
                          <span>AVR-GCC Example</span>
                          <button onClick={() => handleCopy('PORTC ^= (1 << 5);', 'c_toggle')} class="hover:text-white transition-colors">{copiedText === 'c_toggle' ? 'Copiat!' : 'Copy'}</button>
                        </div>
                        <code class="text-indigo-300 font-mono text-[11px]">PORTC ^= (1 &lt;&lt; 5); <span class="text-slate-600">// PC5 se inversează</span></code>
                      </div>
                    </article>

                    {/* READ bit */}
                    <article class="bg-slate-900/40 border border-slate-800 rounded-3xl p-5 space-y-3 hover:border-slate-700/80 transition-all">
                      <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-white bg-slate-950 border border-slate-800 px-2.5 py-1 rounded-lg font-mono">READ</span>
                        <span class="text-emerald-400 font-bold text-xs uppercase tracking-wider">Bit = (PIN &amp; Mask) &gt;&gt; Pin</span>
                      </div>
                      <p class="text-xs text-slate-400 leading-relaxed font-medium">
                        Citește starea unui bit (valoare 0 sau 1) extrăgându-l cu o mască bitwise (&amp;) și deplasându-l (&gt;&gt;) pe prima poziție.
                      </p>
                      <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800 space-y-1">
                        <div class="flex justify-between items-center text-[10px] text-slate-500 font-mono mb-1">
                          <span>AVR-GCC Example</span>
                          <button onClick={() => handleCopy('unsigned char bit = (PINC & (1 << 5)) >> 5;', 'c_read')} class="hover:text-white transition-colors">{copiedText === 'c_read' ? 'Copiat!' : 'Copy'}</button>
                        </div>
                        <code class="text-indigo-300 font-mono text-[11px]">bit = (PINC &amp; (1 &lt;&lt; 5)) &gt;&gt; 5; <span class="text-slate-600">// returnează 0 sau 1</span></code>
                      </div>
                    </article>

                  </div>

                  {/* Warning Note */}
                  <div class="bg-rose-500/10 border border-rose-500/20 rounded-3xl p-5 space-y-2 text-xs">
                    <h4 class="font-bold text-rose-400 flex items-center gap-1.5 uppercase tracking-wide text-[10px]">
                      ⚠️ EROAREA FATALĂ: Negare Bitwise (~) vs Negare Logică (!)
                    </h4>
                    <p class="text-slate-400 leading-relaxed font-medium">
                      <strong>~ (Tilda)</strong> = Negare pe biți. Se aplică pe registre sau măști fizice (ex. <code>~0b00000100</code> devine <code>0b11111011</code>).
                    </p>
                    <p class="text-slate-400 leading-relaxed font-medium">
                      <strong>! (Semnul Exclamării)</strong> = Negare logică (Adevărat/Fals). Transformă orice număr diferit de 0 în 0, iar 0 în 1. Se folosește în evaluări (ex. <code>if (!buton)</code>).
                    </p>
                  </div>

                </section>
              )}

            </div>
          </main>

          {/* Footer */}
          <footer class="mt-auto py-6 border-t border-slate-900 text-center text-xs text-slate-600 font-semibold tracking-wide uppercase">

          </footer>
        </div>
      );
    }

    // Mount App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
