    const { useState, useEffect, useRef } = React;

    const CalculatorIcon = () => (
      <svg className="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 15.75V18m-3-10.5h.008v.008H12.75V7.5zm0 3h.008v.008H12.75v-.008zm0 3h.008v.008H12.75v-.008zm0 3h.008v.008H12.75V16.5zm-3-9h.008v.008H9.75V7.5zm0 3h.008v.008H9.75v-.008zm0 3h.008v.008H9.75v-.008zm-3-6h.008v.008H6.75V4.5zm0 3h.008v.008H6.75V7.5zm0 3h.008v.008H6.75v-.008zm3 9h.008v.008H9.75V16.5zm-3 0h.008v.008H6.75V16.5zm12-9h.008v.008H18.75V7.5zm0 3h.008v.008H18.75v-.008zm0 3h.008v.008H18.75v-.008zm0 3h.008v.008H18.75V16.5zm-12-12h12a1.5 1.5 0 011.5 1.5v15a1.5 1.5 0 01-1.5 1.5h-12a1.5 1.5 0 01-1.5-1.5v-15a1.5 1.5 0 011.5-1.5z" />

    const SignalIcon = () => (
      <svg className="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 00-6-6H3M12 18.75a6 6 0 016-6h3M12 18.75V3M3 12.75a9 9 0 019-9M21 12.75a9 9 0 00-9-9" />

    function App() {
      const [activeTab, setActiveTab] = useState('int'); // int, capture, adc, serial, quiz
      const [copiedText, setCopiedText] = useState(null);

      // --- SECTION 1: INTx States ---
      const [intAlarma, setIntAlarma] = useState(false);
      const [intMode, setIntMode] = useState('falling'); // falling, low_level, rising, change
      const [intLogs, setIntLogs] = useState(['CPU rulează în bucla while(1). Pinii INTx monitorizați.']);
      const [cpuState, setCpuState] = useState('IDLE'); // IDLE, ISR_RUNNING

      const triggerInterrupt = () => {
        if (cpuState === 'ISR_RUNNING') return;
        
        setCpuState('ISR_RUNNING');
        const nextLogs = [
          '⚡ Schimbare de semnal detectată pe PD2 (INT0)!',
          `📌 Configurare detectată: declanșare pe [${intMode.toUpperCase()}].`,
          '📥 CPU întrerupe imediat bucla while(1) și salvează contorul de program (PC).',
          '🚀 Se execută rutina ISR(INT0_vect)...',
          '✅ ISR complet. variabila "alarma" a fost setată pe 1.'
        ];
        
        // Log steps one by one
        let i = 0;
        const interval = setInterval(() => {
          if (i < nextLogs.length) {
            setIntLogs(prev => [nextLogs[i], ...prev.slice(0, 4)]);
            if (i === 4) {
              setIntAlarma(true);
              setCpuState('IDLE');
              setIntLogs(prev => ['↩️ Revenire în main() la instrucțiunea întreruptă.', ...prev.slice(0, 4)]);
            }
            i++;
          } else {
            clearInterval(interval);
          }
        }, 600);
      };

      // --- SECTION 2: Input Capture States ---
      const [wheelSpeed, setWheelSpeed] = useState(15); // in km/h
      const [simTicks, setSimTicks] = useState(0);
      const [s1, setS1] = useState(12000);
      const [s2, setS2] = useState(14000);
      const [icLogs, setIcLogs] = useState(['Senzor pregătit. Așteptăm rotație.']);
      const wheelAngle = useRef(0);

      // Calculate delta and speed based on mathematical inputs
      // Fosc = 1.024 MHz, Prescaler = 256, Roata = 2m
      // Formula: delta = 28800UL / viteza_kmh
      const getDeltaFromSpeed = () => {
        if (wheelSpeed === 0) return 99999;
        return Math.round(28800 / wheelSpeed);
      };

      const delta = getDeltaFromSpeed();

      const simulateRotation = () => {
        const d = getDeltaFromSpeed();
        const nextS1 = s2;
        const nextS2 = (s2 + d) % 65536;
        setS1(nextS1);
        setS2(nextS2);
        
        let calculatedSpeed = 0;
        let isStopped = false;
        if (d <= 8000) {
          calculatedSpeed = Math.round(28800 / d);
        } else {
          isStopped = true;
        }

        const logMsg = isStopped 
          ? `Magnet detectat! delta = ${d} (> 8000). Viteza este forțată la 0 km/h (roata stă pe loc).`
          : `Magnet detectat! s1 = ${nextS1}, s2 = ${nextS2} => delta = ${d} pași. Viteza calculată = ${calculatedSpeed} km/h.`;

        setIcLogs(prev => [logMsg, ...prev.slice(0, 4)]);
      };

      // --- SECTION 3: ADC States ---
      const [adcVolts, setAdcVolts] = useState(2.5); // 0V to 5V
      const adcSteps = Math.round((adcVolts * 1023) / 5);

      // Simulating resistor division key detection
      // Switch 1: 1.0V (ADC ~205), Switch 2: 2.5V (ADC ~512), Switch 3: 4.0V (ADC ~818)
      const getDetectedKey = () => {
        if (adcSteps >= 180 && adcSteps <= 230) return 'Tasta 1 (Meniu)';
        if (adcSteps >= 490 && adcSteps <= 540) return 'Tasta 2 (Select)';
        if (adcSteps >= 795 && adcSteps <= 845) return 'Tasta 3 (Urgență)';
        return 'Nicio tastă apăsată (Zgomot/Tranzitoriu)';
      };

      // --- SECTION 4: Serial Bit-banging States ---
      const [selectedNumber, setSelectedNumber] = useState(12); // binary 01100 (5-bit)
      const [txActive, setTxActive] = useState(false);
      const [txBitIndex, setTxBitIndex] = useState(-1);
      const [txTick, setTxTick] = useState(0);
      const [txSignal, setTxSignal] = useState(0); // 0 = LOW, 1 = HIGH
      const [serialLogs, setSerialLogs] = useState(['Gata pentru transmisie. Alege o tastă și apasă Trimite.']);
      const [waveHistory, setWaveHistory] = useState(Array(25).fill(0)); // Visual wave array of 25 intervals of 200ms

      const binaryString = selectedNumber.toString(2).padStart(5, '0');

      useEffect(() => {
        let interval;
        if (txActive) {
          interval = setInterval(() => {
            const currentBitIndex = Math.floor(txTick / 5); // 5 ticks of 200ms per bit
            const currentSubTick = txTick % 5; // tick inside the bit window (0 to 4)

            if (currentBitIndex >= 5) {
              setTxActive(false);
              setTxBitIndex(-1);
              setTxTick(0);
              setTxSignal(0);
              setSerialLogs(prev => ['🎉 Transmisie finalizată cu succes!', ...prev.slice(0, 4)]);
              return;
            }

            setTxBitIndex(currentBitIndex);

            // Get the current bit from LSB to MSB (as standard UART serial transmission)
            const currentBit = (selectedNumber & (1 << currentBitIndex)) >> currentBitIndex;
            let signalValue = 0;

            if (currentSubTick === 0) {
              // At start of bit window, signal is always set HIGH
              signalValue = 1;
            } else {
              if (currentBit === 0) {
                // For bit '0', signal falls to LOW at tick 1 (200ms)
                signalValue = currentSubTick >= 1 ? 0 : 1;
              } else {
                // For bit '1', signal falls to LOW at tick 4 (800ms)
                signalValue = currentSubTick >= 4 ? 0 : 1;
              }
            }

            setTxSignal(signalValue);
            setWaveHistory(prev => [...prev.slice(1), signalValue]);

            const logMsg = `[Bit ${currentBitIndex}: valoare ${currentBit}] tick = ${currentSubTick} (timp = ${currentSubTick * 200}ms) => Pinul DATA = ${signalValue === 1 ? 'HIGH' : 'LOW'}`;
            setSerialLogs(prev => [logMsg, ...prev.slice(0, 4)]);

            setTxTick(prev => prev + 1);
          }, 400); // Speed up tick interval slightly for better visualization
        }
        return () => clearInterval(interval);
      }, [txActive, txTick, selectedNumber]);

      const startSerialTx = () => {
        if (txActive) return;
        setTxActive(true);
        setTxTick(0);
        setTxBitIndex(0);
        setWaveHistory(Array(25).fill(0));
        setSerialLogs(['🚀 Transmisie începută. Se blochează citirea de taste noi...']);
      };

      // --- SECTION 5: Quiz Data ---
      const quizQuestions = [
        {
          id: 'q1',
          question: 'Cum configurezi pinul INT0 să declanșeze pe front coborâtor (Falling Edge) conform registrului MCUCR?',
          options: [
            'MCUCR |= (1 << ISC00); // ISC01 rămâne 0',
            'MCUCR |= (1 << ISC01); // ISC00 rămâne 0 (ISC01=1, ISC00=0)',
            'MCUCR |= (1 << ISC01) | (1 << ISC00); // Ambele pe 1',
            'MCUCR = 0x00; // Declanșează doar la nivel de 0 logic'
          ],
          correct: 1,
          explanation: 'Conform manualului ATmega16, bitul ISC01 setat pe 1 și ISC00 setat pe 0 configurează întreruperea externă INT0 să se declanșeze pe frontul coborâtor (momentul în care butonul cu pull-up este apăsat spre masă).'
        },
        {
          id: 'q2',
          question: 'De ce este necesar să impunem un prag maxim pentru delta_s (ex: delta_s > 8000) în algoritmul turometrului?',
          options: [
            'Pentru a preveni depășirea valorii maxime a registrului pe 8 biți OCR0.',
            'Pentru a detecta oprirea roții și a forța viteza la 0, altfel viteza ar rămâne înghețată la ultima citire dacă magnetul nu mai trece prin fața senzorului.',
            'Pentru a converti valoarea din pași direct în kilometri fără a mai efectua împărțirea.',
            'Pentru a curăța vibrațiile mecanice ale contactelor senzorului magnetic.'
          ],
          correct: 1,
          explanation: 'Dacă roata se oprește, nu se mai primesc amprente noi de timp în registrul ICR1. Fără acest prag, codul din main ar afișa continuu ultima viteză calculată. Pragul indică faptul că timpul scurs între rotații este prea mare (viteză sub pragul minim), deci roata stă.'
        },
        {
          id: 'q3',
          question: 'Care este registrul din care selectăm canalul de intrare ADC (ex: PA0 - PA7) și tensiunea de referință?',
          options: [
            'ADCSRA (ADC Control and Status Register A)',
            'ADMUX (ADC Multiplexer Selection Register)',
            'SREG (Status Register)',
            'PORTA (Port A Data Register)'
          ],
          correct: 1,
          explanation: 'ADMUX (ADC Multiplexer Selection Register) conține biții REFS1-REFS0 pentru selectarea tensiunii de referință și biții MUX4-MUX0 pentru rutarea canalului analogic dorit spre convertor.'
        },
        {
          id: 'q4',
          question: 'La emularea software a unui protocol serial (ex: trimiterea unei taste pe 5 biți), cum se determină perioada optimă a timerului?',
          options: [
            'Alegem cel mai mic divizor comun al tuturor timpilor din protocol.',
            'Alegem cel mai mare divizor comun (CMMDC) al tuturor timpilor din diagramă (ex: pentru timpi de 200ms, 800ms și 1000ms, alegem baza de timp de 200ms).',
            'Alegem întotdeauna valoarea fixă de 1ms conform bazei de timp standard.',
            'Baza de timp se alege arbitrar, deoarece receptorul se auto-sincronizează la frecvența CPU-ului.'
          ],
          correct: 1,
          explanation: 'Pentru a reprezenta corect toți timpii din protocol folosind un singur timer, rezoluția timerului trebuie să fie Cel Mai Mare Divizor Comun (CMMDC) al acelor timpi, obținând astfel o frecvență optimă pentru întreruperi, fără pierderi de precizie.'
        }
      ];

      const [quizAnswers, setQuizAnswers] = useState({ q1: null, q2: null, q3: null, q4: null });
      const [showQuizResults, setShowQuizResults] = useState(false);

      return (
        <div className="flex-1 flex flex-col justify-between">
          <main className="relative mx-auto flex w-full max-w-6xl flex-col px-4 py-8 sm:px-6 lg:px-8 justify-between animate-fade-in">
            
            {/* Header / Nav */}
            <header className="flex items-center justify-between mb-8">
              <nav className="flex items-center space-x-2 text-sm text-slate-400 font-medium">
                <a href="../index.html" className="flex items-center hover:text-white transition-colors duration-150 py-1 px-2 rounded-md hover:bg-white/5">
                  <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                  </svg>
                  Microprocesoare Hub
                </a>
                <span className="text-slate-600 font-semibold">/</span>
                <span className="text-indigo-400 font-bold bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20">Teorie: Master Jedi</span>
              </nav>

              <div className="hidden sm:flex items-center space-x-2 text-xs text-slate-400 bg-slate-900/60 border border-slate-800 rounded-full px-3 py-1.5 backdrop-blur-md">
                <span className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                <span className="font-semibold uppercase tracking-wider">Capitolul 4: Teorie</span>
              </div>
            </header>

            {/* Hero Section */}
            <section className="text-center sm:text-left mb-8 space-y-3">
              <div className="inline-flex items-center gap-2 rounded-full border border-rose-500/30 bg-rose-500/10 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-rose-400">
                🚀 MEGA-MATERIAL ZIUA 3
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight text-white sm:text-4xl md:text-5xl bg-gradient-to-r from-white via-slate-100 to-indigo-200 bg-clip-text text-transparent">
                Analog & Timp Critic
              </h1>
              <p className="max-w-3xl text-sm leading-relaxed text-slate-400 font-medium">
                Bine ai venit la nivelul de Maestru Jedi! Aici învățăm cum interacționăm cu lumea fizică reală: evenimente asincrone rapide (Întreruperi Externe), măsurători precise de viteză (Input Capture), citiri analogice (ADC) și emulare de protocoale de transmisie serială.
              </p>
            </section>

            {/* Navigation Tabs */}
            <nav className="flex flex-wrap gap-2 mb-8 border-b border-slate-900 pb-4">
              <button 
                onClick={() => setActiveTab('int')}
                className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-150 ${activeTab === 'int' ? 'bg-rose-600 text-white shadow-glow-rose' : 'bg-slate-900/65 text-slate-400 border border-slate-850 hover:bg-slate-900 hover:text-slate-200'}`}
              >
                1. Întreruperi INTx
              </button>
              <button 
                onClick={() => setActiveTab('capture')}
                className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-150 ${activeTab === 'capture' ? 'bg-rose-600 text-white shadow-glow-rose' : 'bg-slate-900/65 text-slate-400 border border-slate-850 hover:bg-slate-900 hover:text-slate-200'}`}
              >
                2. Input Capture
              </button>
              <button 
                onClick={() => setActiveTab('adc')}
                className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-150 ${activeTab === 'adc' ? 'bg-rose-600 text-white shadow-glow-rose' : 'bg-slate-900/65 text-slate-400 border border-slate-850 hover:bg-slate-900 hover:text-slate-200'}`}
              >
                3. Convertor ADC
              </button>
              <button 
                onClick={() => setActiveTab('serial')}
                className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-150 ${activeTab === 'serial' ? 'bg-rose-600 text-white shadow-glow-rose' : 'bg-slate-900/65 text-slate-400 border border-slate-850 hover:bg-slate-900 hover:text-slate-200'}`}
              >
                4. Protocol Serial
              </button>
              <button 
                onClick={() => setActiveTab('quiz')}
                className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-150 ${activeTab === 'quiz' ? 'bg-rose-600 text-white shadow-glow-rose' : 'bg-slate-900/65 text-slate-400 border border-slate-850 hover:bg-slate-900 hover:text-slate-200'}`}
              >
                5. Test Teorie
              </button>
            </nav>

            {/* TAB 1: INTx EXTERNAL INTERRUPTS */}
            {activeTab === 'int' && (
              <section className="grid gap-6 lg:grid-cols-12 animate-slide-up">
                
                {/* Theory & Config */}
                <div className="lg:col-span-5 space-y-6">
                  <article className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 backdrop-blur-md space-y-4">
                    <h3 className="text-base font-bold text-white flex items-center gap-2">
                      <BookIcon />
                      Întreruperi Externe (Butonul de Panică)
                    </h3>
                    <div className="space-y-3 text-xs leading-relaxed text-slate-400 font-medium">
                      <p>
                        Nu poți pune un senzor critic (buton de oprire de urgență, coliziune) să fie citit prin interogare ciclică (polling) în <code className="text-white font-mono">while(1)</code>, deoarece procesorul ar putea fi ocupat cu calcule lungi și ar putea rata evenimentul.
                      </p>
                      <p>
                        Folosim pinii hardware dedicați **INT0 (PD2)**, **INT1 (PD3)** sau **INT2 (PB2)**. O schimbare de tensiune pe acești pini forțează CPU să oprească execuția curentă și să ruleze codul de urgență.
                      </p>
                      
                      <h4 className="font-bold text-white mt-4">Regiștri Configurați:</h4>
                      <ul className="space-y-2 text-[11px] list-disc list-inside">
                        <li><strong className="text-indigo-400">MCUCR</strong>: Setezi tipul de front (Front coborâtor, Front ridicător, Nivel LOW logic, Orice tranziție).</li>
                        <li><strong className="text-violet-400">GICR</strong>: Armează individual fiecare pin de întrerupere.</li>
                        <li><strong className="text-white font-mono">sei()</strong>: Activarea globală în SREG.</li>
                      </ul>
                    </div>
                  </article>

                  <article className="bg-[#1e1e1e] rounded-3xl border border-slate-800/80 overflow-hidden shadow-inner space-y-px">
                    <div className="bg-[#181818] px-6 py-3 border-b border-slate-800/80 flex justify-between items-center text-xs font-mono select-none">
                      <span className="text-slate-350">Inițializare INT0 pe Front Coborâtor</span>

                          <span className="text-emerald-400 font-mono font-bold text-sm bg-emerald-500/10 px-2.5 py-0.5 rounded border border-emerald-500/20">{adcVolts.toFixed(2)} Volți</span>
                        </div>
                        <input 
                          type="range"
                          min="0"
                          max="5"
                          step="0.05"
                          value={adcVolts}
                          onChange={(e) => setAdcVolts(parseFloat(e.target.value))}
                          className="w-full h-1.5 bg-slate-900 rounded-lg appearance-none cursor-pointer accent-emerald-500 focus:outline-none"
                        />
                        <div className="flex justify-between text-[10px] text-slate-500">
                          <span>0V (GND)</span>
                          <span>2.5V</span>
                          <span>5V (AVCC)</span>
                        </div>
                      </div>

                      {/* Visual Results Grid */}
                      <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-850 text-center">
                          <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">Valoare ADC (Registru)</span>
                          <span className="font-mono text-white text-2xl font-bold block mt-1.5">{adcSteps}</span>
                          <span className="text-[9px] text-slate-500 block mt-1">Gama: 0 - 1023 (10-bit)</span>
                        </div>
                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-850 text-center">
                          <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">Tasta Detectată (Examen)</span>
                          <span className="font-mono text-emerald-400 text-sm font-bold block mt-3">{getDetectedKey()}</span>
                          <span className="text-[9px] text-slate-500 block mt-1">Fereastră cu marjă de +/- 25 pași</span>
                        </div>
                      </div>

                      {/* Resistor Ladder Guide */}
                      <div className="bg-slate-950/30 p-4 rounded-xl border border-slate-850/60">
                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Comportament Butoane (Ladder):</span>
                        <div className="grid grid-cols-3 gap-2 text-center text-[10px]">
                          <div className={`p-2 rounded-lg border ${getDetectedKey().includes('Tasta 1') ? 'bg-emerald-500/10 border-emerald-500/35 text-white font-bold' : 'bg-slate-950/20 border-slate-900 text-slate-500'}`}>
                            <span>Tasta 1 (1V)</span>
                            <span className="block font-mono text-[9px] mt-0.5">ADC 180-230</span>
                          </div>
                          <div className={`p-2 rounded-lg border ${getDetectedKey().includes('Tasta 2') ? 'bg-emerald-500/10 border-emerald-500/35 text-white font-bold' : 'bg-slate-950/20 border-slate-900 text-slate-500'}`}>
                            <span>Tasta 2 (2.5V)</span>
                            <span className="block font-mono text-[9px] mt-0.5">ADC 490-540</span>
                          </div>
                          <div className={`p-2 rounded-lg border ${getDetectedKey().includes('Tasta 3') ? 'bg-emerald-500/10 border-emerald-500/35 text-white font-bold' : 'bg-slate-950/20 border-slate-900 text-slate-500'}`}>
                            <span>Tasta 3 (4.0V)</span>
                            <span className="block font-mono text-[9px] mt-0.5">ADC 795-845</span>
                          </div>
                        </div>
                      </div>

                    </div>
                  </div>

                </div>

              </section>
            )}

            {/* TAB 4: SERIAL BIT-BANGING */}
            {activeTab === 'serial' && (
              <section className="grid gap-6 lg:grid-cols-12 animate-slide-up">
                
                {/* Theory & Mathematics */}
                <div className="lg:col-span-5 space-y-6">
                  <article className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 backdrop-blur-md space-y-4">
                    <h3 className="text-base font-bold text-white flex items-center gap-2">
                      <BookIcon />
                      Comunicație Serială (Bit-Banging)
                    </h3>
                    <div className="space-y-3 text-xs leading-relaxed text-slate-400 font-medium">
                      <p>
                        Când dorești să trimiți un cod (ex. o tastă de 5 biți) pe un singur fir, trebuie să controlezi semnalul în timp generând manual forma de undă a fiecărui bit (tehnică numită *bit-banging*).
                      </p>
                      <p>
                        <strong>Regula CMMDC (Cel Mai Mare Divizor Comun):</strong> Dacă diagrama ta are nevoie de mai mulți timpi diferiți (ex: o fereastră de 1000ms, timpi activi de 800ms pentru bitul "1" și 200ms pentru bitul "0"), rezoluția timerului va fi CMMDC-ul acelor timpi => **200 ms**.
                      </p>
                      
                      <h4 className="font-bold text-white mt-4">Matematica Timerului la 16 MHz (Timer 1):</h4>
                      <p>
                        T_cycle = 200ms = 0.2s.
                      </p>
                      <div className="p-3 bg-slate-950 rounded-xl border border-slate-850 font-mono text-white text-[11px]">
                        0.2 = p * N * (1 / 16.000.000) => p * N = 3.200.000.
                        <br/>
                        Alegem prescaler p=1024 => N = 3125.
                        <br/>
                        Valoarea OCR1A = 3124.
                      </div>
                      <p>
                        La fiecare 200ms, intrăm în ISR. O fereastră de bit are 1000ms (adică 5 tick-uri de 200ms). Numărăm tick-urile de la 0 la 4 și controlăm pinul DATA corespunzător bitului curent.
                      </p>
                    </div>
                  </article>
                </div>

                {/* Interactive Signal Sandbox */}
                <div className="lg:col-span-7 space-y-6">
                  
                  <article className="bg-[#1e1e1e] rounded-3xl border border-slate-800/80 overflow-hidden shadow-inner space-y-px">
                    <div className="bg-[#181818] px-6 py-3 border-b border-slate-800/80 flex justify-between items-center text-xs font-mono select-none">
                      <span className="text-slate-350">Logica de bit-banging din ISR (C)</span>
                      <button 
                        onClick={() => handleCopy(`ISR(TIMER1_COMPA_vect) {\n    if (trimitem_acum) {\n        unsigned char bit_curent = (cod_tasta & (1 << bit_index)) >> bit_index;\n        if (tick == 0) PORTC |= (1 << 0); // Start HIGH\n        if (bit_curent == 0 && tick == 1) PORTC &= ~(1 << 0); // Fall after 200ms\n        if (bit_curent == 1 && tick == 4) PORTC &= ~(1 << 0); // Fall after 800ms\n        tick++;\n        if (tick == 5) {\n            tick = 0;\n            bit_index++;\n            if (bit_index == 5) {\n                trimitem_acum = 0; // Done\n            }\n        }\n    }\n}`, 'ser_code')}
                        className="text-rose-400 hover:text-rose-300 text-[11px] font-bold uppercase tracking-wider transition-colors"
                      >
                        {copiedText === 'ser_code' ? 'Copiat!' : 'Copiază Codul'}
                      </button>
                    </div>
                    <pre className="p-3 font-mono text-[9px] leading-normal text-[#D4D4D4] overflow-x-auto max-h-[250px]">
                      <span className="text-[#C586C0]">ISR</span>(<span className="text-[#9CDCFE]">TIMER1_COMPA_vect</span>) &#123;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#C586C0]">if</span> (<span className="text-[#9CDCFE]">trimitem_acum</span> == <span className="text-[#B5CEA8]">1</span>) &#123;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#569CD6]">unsigned char</span> <span className="text-[#9CDCFE]">bit_curent</span> = (<span className="text-[#9CDCFE]">cod_tasta</span> &amp; (<span className="text-[#B5CEA8]">1</span> &lt;&lt; <span className="text-[#9CDCFE]">bit_index</span>)) &gt;&gt; <span className="text-[#9CDCFE]">bit_index</span>;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#C586C0]">if</span> (<span className="text-[#9CDCFE]">tick</span> == <span className="text-[#B5CEA8]">0</span>) <span className="text-[#9CDCFE]">PORTC</span> |= (<span className="text-[#B5CEA8]">1</span> &lt;&lt; <span className="text-[#B5CEA8]">0</span>); <span className="text-[#6A9955]">// Start HIGH</span><br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#C586C0]">if</span> (<span className="text-[#9CDCFE]">bit_curent</span> == <span className="text-[#B5CEA8]">0</span> &amp;&amp; <span className="text-[#9CDCFE]">tick</span> == <span className="text-[#B5CEA8]">1</span>) <span className="text-[#9CDCFE]">PORTC</span> &amp;= ~(<span className="text-[#B5CEA8]">1</span> &lt;&lt; <span className="text-[#B5CEA8]">0</span>); <span className="text-[#6A9955]">// 200ms</span><br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#C586C0]">if</span> (<span className="text-[#9CDCFE]">bit_curent</span> == <span className="text-[#B5CEA8]">1</span> &amp;&amp; <span className="text-[#9CDCFE]">tick</span> == <span className="text-[#B5CEA8]">4</span>) <span className="text-[#9CDCFE]">PORTC</span> &amp;= ~(<span className="text-[#B5CEA8]">1</span> &lt;&lt; <span className="text-[#B5CEA8]">0</span>); <span className="text-[#6A9955]">// 800ms</span><br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#9CDCFE]">tick</span>++;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#C586C0]">if</span> (<span className="text-[#9CDCFE]">tick</span> == <span className="text-[#B5CEA8]">5</span>) &#123;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#9CDCFE]">tick</span> = <span className="text-[#B5CEA8]">0</span>;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#9CDCFE]">bit_index</span>++;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-[#C586C0]">if</span> (<span className="text-[#9CDCFE]">bit_index</span> == <span className="text-[#B5CEA8]">5</span>) <span className="text-[#9CDCFE]">trimitem_acum</span> = <span className="text-[#B5CEA8]">0</span>;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&#125;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&#125;<br/>
                      &#125;
                    </pre>
                  </article>

                  {/* Serial visualizer sandbox */}
                  <div className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 backdrop-blur-md space-y-4">
                    <h3 className="text-base font-bold text-white flex items-center gap-2">
                      <SignalIcon />
                      Visualizator Transmisie Serială în Timp Real
                    </h3>

                    <div className="space-y-4 text-xs">
                      
                      <div className="flex flex-wrap gap-4 items-center justify-between p-4 bg-slate-950/60 border border-slate-850 rounded-2xl">
                        <div className="space-y-1">
                          <span className="text-[10px] text-slate-500 uppercase font-bold block">Tasta de trimis (Valoare 5-bit)</span>
                          <select 
                            value={selectedNumber}
                            onChange={(e) => setSelectedNumber(parseInt(e.target.value))}
                            disabled={txActive}
                            className="bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 text-white"
                          >
                            <option value={12}>Tasta 12 (01100 bin)</option>
                            <option value={9}>Tasta 9 (01001 bin)</option>
                            <option value={19}>Tasta 19 (10011 bin)</option>
                            <option value={31}>Tasta 31 (11111 bin)</option>
                          </select>
                        </div>

                        <button 
                          onClick={startSerialTx}
                          disabled={txActive}
                          className="bg-rose-600 hover:bg-rose-500 disabled:bg-slate-800 text-white rounded-xl px-5 py-3 font-bold transition-all shadow-glow-rose"
                        >
                          {txActive ? 'Se transmite...' : 'Trimite Serial'}
                        </button>
                      </div>

                      {/* Output visual wave */}
                      <div className="space-y-2">
                        <div className="flex justify-between items-center text-[10px] text-slate-500 font-bold uppercase">
                          <span>Nivel Pin DATA (PC0): {txSignal === 1 ? 'HIGH (1)' : 'LOW (0)'}</span>
                          <span>Bit curent index: {txBitIndex !== -1 ? txBitIndex : 'Inactiv'}</span>
                        </div>
                        <div className="h-16 bg-slate-950 rounded-xl border border-slate-850 overflow-hidden relative flex items-end">
                          {/* Grid ticks vertical lines */}
                          <div className="absolute inset-0 flex justify-between pointer-events-none">
                            {Array(25).fill(0).map((_, i) => (
                              <div key={i} className={`h-full border-r ${i % 5 === 0 ? 'border-slate-800/80' : 'border-slate-900/40'}`} style={{ width: `${100/25}%` }}></div>
                            ))}
                          </div>
                          {/* Draw wave segments */}
                          <div className="w-full h-10 flex items-end relative px-1">
                            {waveHistory.map((val, idx) => (
                              <div 
                                key={idx} 
                                className={`h-full transition-all duration-75 ${val === 1 ? 'bg-rose-500 border-t border-rose-400' : 'bg-slate-900 border-t border-slate-850'}`}
                                style={{ 
                                  width: `${100/25}%`, 
                                  height: val === 1 ? '100%' : '8px',
                                  opacity: idx === waveHistory.length - 1 ? 1 : 0.6 + (idx * 0.015)
                                }}
                              ></div>
                            ))}
                          </div>
                        </div>
                        <div className="flex justify-between text-[8px] text-slate-650 font-bold px-1 select-none">
                          <span>Bit 0 (LSB)</span>
                          <span>Bit 1</span>
                          <span>Bit 2</span>
                          <span>Bit 3</span>
                          <span>Bit 4 (MSB)</span>
                        </div>
                      </div>

                      {/* Debug console */}
                      <div className="bg-slate-950 border border-slate-850 rounded-2xl p-4 space-y-1">
                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block border-b border-slate-850/50 pb-1 mb-2">Monitor Serial Bit-Banging</span>
                        <div className="font-mono text-[10px] space-y-1 leading-normal">
                          {serialLogs.map((log, idx) => (
                            <div key={idx} className={`${idx === 0 ? 'text-rose-400 font-bold' : 'text-slate-500'}`}>
                              &gt; {log}
                            </div>
                          ))}
                        </div>
                      </div>

                    </div>
                  </div>

                </div>

              </section>
            )}

            {/* TAB 5: QUIZ DE TEORIE */}
            {activeTab === 'quiz' && (
              <section className="max-w-3xl mx-auto animate-slide-up space-y-6">
                
                <div className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 backdrop-blur-md space-y-6">
                  <h3 className="text-base font-bold text-white flex items-center gap-2">
                    <BookIcon />
                    Quiz rapid: Testează-ți Teoria
                  </h3>

                  <div className="space-y-6">
                    {quizQuestions.map((q, qIndex) => (
                      <div key={q.id} className="space-y-2.5">
                        <h4 className="text-xs font-bold text-slate-300 leading-relaxed">
                          {qIndex + 1}. {q.question}
                        </h4>
                        
                        <div className="grid gap-2">
                          {q.options.map((opt, optIndex) => {
                            const isSelected = quizAnswers[q.id] === optIndex;
                            const isCorrect = optIndex === q.correct;
                            let style = "bg-slate-950/40 border-slate-800 text-slate-400 hover:border-slate-700 hover:text-white";

                            if (showQuizResults) {
                              if (isCorrect) {
                                style = "bg-emerald-500/10 border-emerald-500/35 text-emerald-400";
                              } else if (isSelected) {
                                style = "bg-rose-500/10 border-rose-500/35 text-rose-400";
                              } else {
                                style = "bg-slate-950/20 border-slate-900 text-slate-650 opacity-60";
                              }
                            } else if (isSelected) {
                              style = "bg-rose-500/10 border-rose-500/40 text-rose-400";
                            }

                            return (
                              <button
                                key={optIndex}
                                onClick={() => {
                                  if (showQuizResults) return;
                                  setQuizAnswers({ ...quizAnswers, [q.id]: optIndex });
                                }}
                                disabled={showQuizResults}
                                className={`text-left text-xs px-4 py-3 rounded-xl border transition-all duration-150 leading-relaxed ${style}`}
                              >
                                {opt}
                              </button>
                            );
                          })}
                        </div>

                        {showQuizResults && (
                          <p className="text-[11px] text-slate-500 italic mt-1 leading-relaxed pl-2 border-l border-rose-500/25">
                            Explicație: {q.explanation}
                          </p>
                        )}
                      </div>
                    ))}
                  </div>

                  <div className="flex space-x-4 pt-4 border-t border-slate-800/80 justify-end">
                    {showQuizResults ? (
                      <button
                        onClick={() => {
                          setQuizAnswers({ q1: null, q2: null, q3: null, q4: null });
                          setShowQuizResults(false);
                        }}
                        className="bg-[#25252b] hover:bg-slate-800 text-slate-350 px-5 py-2.5 rounded-xl text-xs font-bold border border-slate-850"
                      >
                        Resetează Quiz-ul
                      </button>
                    ) : (
                      <button
                        onClick={() => setShowQuizResults(true)}
                        disabled={Object.values(quizAnswers).some(x => x === null)}
                        className="bg-rose-600 hover:bg-rose-500 disabled:bg-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed text-white px-6 py-2.5 rounded-xl text-xs font-bold transition-all"
                      >
                        Verifică Răspunsurile
                      </button>
                    )}
                  </div>
                </div>

              </section>
            )}

          </main>

          {/* Footer */}
          <footer className="mt-auto py-6 border-t border-slate-900 text-center text-xs text-slate-600 font-semibold tracking-wide uppercase">
            &copy; 2026 ExamTrainers. Construit cu React, Tailwind CSS și dragoste pentru <a href="https://github.com/andreisugu" target="_blank" rel="noopener noreferrer" className="hover:text-indigo-400 transition-colors duration-150 normal-case underline decoration-wavy decoration-indigo-500/30 underline-offset-4">sisteme încorporate</a> de <a href="https://github.com/andreisugu" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 hover:text-indigo-400 transition-colors duration-150 normal-case font-mono ml-0.5"><svg className="w-3.5 h-3.5 fill-current" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>@andreisugu</a>.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
